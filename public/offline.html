<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FilmReel Offline</title>
    <meta name="theme-color" content="#1a1122" />
    <style>
        :root {
            --bg-dark: #0f0814;
            --surface-dark: rgba(26, 17, 34, 0.9);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --accent-purple: #7f13ec;
            --accent-purple-glow: rgba(127, 19, 236, 0.35);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Spline Sans", system-ui, sans-serif;
            background:
                radial-gradient(circle at top, rgba(127, 19, 236, 0.18), transparent 38%),
                #0f0814;
            color: var(--text-primary);
        }

        .card {
            width: min(100%, 460px);
            padding: 32px;
            border-radius: 24px;
            background: var(--surface-dark);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 22px 60px rgba(0, 0, 0, 0.45);
            text-align: center;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            border-radius: 18px;
            background: rgba(127, 19, 236, 0.18);
            box-shadow: 0 0 24px var(--accent-purple-glow);
            font-size: 28px;
            margin-bottom: 20px;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 2rem;
        }

        p {
            margin: 0;
            line-height: 1.6;
            color: var(--text-secondary);
        }

        .actions {
            margin-top: 24px;
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        a,
        button {
            appearance: none;
            border: none;
            border-radius: 999px;
            padding: 12px 18px;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
        }

        .primary {
            background: var(--accent-purple);
            color: white;
        }

        .secondary {
            background: rgba(255, 255, 255, 0.06);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>

<body>
    <main class="card">
        <div class="badge">FR</div>
        <h1>You're Offline</h1>
        <p>
            FilmReel can't reach the network right now. Cached pages may still work,
            but fresh movie and TV data needs a connection.
        </p>
        <div class="actions">
            <a class="primary" href="/">Try Again</a>
            <button class="secondary" type="button" onclick="window.location.reload()">
                Reload
            </button>
        </div>
    </main>
</body>

</html>
